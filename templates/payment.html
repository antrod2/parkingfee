<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 요청</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body>
    <div class="container payment-container">
        <div class="header">Parking Go™ 스마트 결제</div>
        <div class="instructions">아래 정보를 확인하고 결제를 진행해주세요</div>

        <div class="info-section" style="margin-bottom: 24px;">
            <div class="info-item"><span>차량번호:</span><span>{{ carNumber }}</span></div>
            <div class="info-item"><span>결제금액:</span><span class="highlight">{{ total }} 원</span></div>
        </div>

        {% set is_disabled = (total == "정기권 입니다") or (total == "0") %}

        <button
            class="pay-button"
            id="payBtn"
            {% if is_disabled %}
                disabled
                style="background-color: #ccc; cursor: not-allowed;"
            {% endif %}
        >
            {% if total == "정기권 입니다" %}
                정기권 입니다
            {% elif total == "0" %}
                무료 주차
            {% else %}
                {{ total }}원 결제하기
            {% endif %}
        </button>

        <button class="return-button" onclick="window.location.href='/'">처음으로</button>
    </div>

    <script>
        const clientKey = '{{ toss_client_key }}';
        const carNumber = '{{ carNumber }}';
        const totalStr = '{{ total }}';

        // 금액 숫자 변환 (쉼표 제거)
        const amount = parseInt(totalStr.replace(/,/g, ''), 10);

        // orderId: 영문/숫자/하이픈, 6~64자
        const timestamp = Date.now();
        const safeCarNum = carNumber.replace(/[^a-zA-Z0-9가-힣]/g, '');
        const orderId = 'PARK-' + timestamp;

        const tossPayments = TossPayments(clientKey);

        document.getElementById('payBtn').addEventListener('click', function () {
            tossPayments.requestPayment('카드', {
                amount: amount,
                orderId: orderId,
                orderName: '주차요금 (' + carNumber + ')',
                customerName: carNumber,
                successUrl: window.location.origin + '/payment/success',
                failUrl: window.location.origin + '/payment/fail',
            }).catch(function (error) {
                if (error.code !== 'USER_CANCEL') {
                    alert('[오류] ' + error.message);
                }
            });
        });
    </script>
</body>
</html>
